# HAProxy as the single entry point for BOTH databases, write and read.
#
# With Patroni, the leader is not a fixed host — it moves on failover. So HAProxy does not
# hardcode a primary; instead it health-checks each node's Patroni REST API (port 8008):
#   GET /primary  returns 200 ONLY on the current leader   -> the write backend
#   GET /replica  returns 200 ONLY on running replicas     -> the read backend
# When failover promotes a new leader, its /primary flips to 200 and HAProxy follows it
# automatically — the app keeps using the same URLs.
#
#   :5000 -> DB A write (leader)      :5001 -> DB A read (replicas)
#   :5010 -> DB B write (leader)      :5011 -> DB B read (replicas)
#   :7000 -> HAProxy stats UI (http)

global
    log stdout format raw local0 info
    maxconn 2048

defaults
    mode tcp
    log global
    option tcplog
    retries 2
    timeout connect 5s
    timeout client  30m
    timeout server  30m
    # Health check hits the Patroni REST API; expect HTTP 200.
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

# Docker's embedded DNS, so `--scale patroni-a=N` is discovered automatically:
# the service name resolves to every node's IP and server-template fills the slots.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 5s

frontend stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s

# ── DB A ─────────────────────────────────────────────────────────────────────
# server-template pre-provisions up to 6 slots per pool, filled from the service's DNS
# records. Exactly one node answers /primary (the leader) so the write pool has one live
# server; the others answer /replica so they fill the read pool. Raise 6 to scale further.
listen a_write
    bind *:5000
    option httpchk GET /primary
    http-check expect status 200
    server-template a 6 patroni-a:5432 check port 8008 resolvers docker init-addr none

listen a_read
    bind *:5001
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    server-template a 6 patroni-a:5432 check port 8008 resolvers docker init-addr none

# ── DB B (feed / notification) ───────────────────────────────────────────────
listen b_write
    bind *:5010
    option httpchk GET /primary
    http-check expect status 200
    server-template b 6 patroni-b:5432 check port 8008 resolvers docker init-addr none

listen b_read
    bind *:5011
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    server-template b 6 patroni-b:5432 check port 8008 resolvers docker init-addr none
