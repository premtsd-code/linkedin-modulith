# Load-balances across web replicas. Docker's embedded DNS round-robins the
# 'web' service name, so `docker compose up --scale web=3` is balanced for free.
events {}
http {
    resolver 127.0.0.11 valid=10s;
    server {
        listen 80;
        location / {
            set $upstream web:8080;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
