# ── Base config (always active) ─────────────────────────────────────────────
spring:
  application:
    name: linkedin-modulith

  # Environment umbrellas over the capability profiles (postgres/neo4j/feeddb/web/worker).
  # An environment says WHERE we run; it expands to the capabilities that shape needs:
  #   dev  -> nothing extra: single-process H2, everything in-process (the default shape)
  #   prod -> the real datastores; still add the role ('web' or 'worker') alongside it,
  #           e.g. SPRING_PROFILES_ACTIVE=prod,web  /  prod,worker
  # 'feeddb' stays the actual switch for the dedicated feed DB — 'prod' just includes it.
  profiles:
    group:
      dev: []
      prod:
        - postgres
        - neo4j
        - feeddb

  # Single-process default: H2, in-process workers, no external services.
  datasource:
    url: jdbc:h2:mem:linkedin;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false

  # Durable in-process event registry (used by the single-process default mode).
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
      republish-outstanding-events-on-restart: true
      # Outbound externalization to Kafka is OFF by default so the single-process
      # H2 mode (and tests) never touch a broker. The web role turns it on.
      externalization:
        enabled: false

  # Kafka client config. Lazy: no connection unless a 'web'/'worker' profile
  # actually publishes or listens. Bootstrap address comes from the environment.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Explicit allow-list for JSON type headers — NEVER wildcard this; a
        # wildcard is a deserialization attack surface (InboundEventRelay reads
        # arbitrary broker payloads into JVM types).
        spring.json.trusted.packages: "com.premtsd.linkedin.user.events,com.premtsd.linkedin.post.events,com.premtsd.linkedin.connections.events"

jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes-long!!}

server:
  port: ${SERVER_PORT:8080}

# Deployment role. Drives the bean-level conditions:
#   standalone (default) — single process, everything in-process, no Kafka
#   web                  — HTTP + externalize events to Kafka; no in-process workers
#   worker               — no HTTP; InboundEventRelay + JobPoller drive the workers
# The web/worker Spring profiles below set this; APP_ROLE can override.
app:
  role: ${APP_ROLE:standalone}
  worker:
    group: ${WORKER_GROUP:linkedin-workers}
  # Read-your-writes sticky window (feeddb): after a user writes, their reads go to the
  # primary for this long, so an async replica's lag can't hide their own change. Set it
  # to a bit more than the largest replication lag you expect to see.
  ryow:
    window: ${RYOW_WINDOW:5s}

# Durable job runtime (worker role). See the pitfalls before tuning:
#   lease-duration MUST exceed the slowest single run() slice, or the reaper hands
#   the job to a second worker and both execute; concurrency MUST stay under the
#   Hikari pool size, or finishing jobs (each needs a connection) deadlock the poller.
jobs:
  poll-interval: 1s
  reaper-interval: 30s
  lease-duration: 60s
  batch-size: 20
  concurrency: 8
  retry-base-delay: 5s
  retry-max-delay: 15m

---
# ── postgres: real relational store (used by the web/worker containers) ──────
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkedin}
    username: ${SPRING_DATASOURCE_USERNAME:linkedin}
    password: ${SPRING_DATASOURCE_PASSWORD:linkedin}
  jpa:
    hibernate:
      ddl-auto: update

---
# ── web: serves HTTP, publishes domain events to Kafka (no in-process workers) ─
spring:
  config:
    activate:
      on-profile: web
  modulith:
    events:
      externalization:
        enabled: true
app:
  role: web

---
# ── worker: no HTTP; consumes Kafka and runs the async work. Scale this tier. ─
spring:
  config:
    activate:
      on-profile: worker
  main:
    web-application-type: none
app:
  role: worker

---
# ── cloudinary: cloud upload backend for the uploader module ─────────────────
spring:
  config:
    activate:
      on-profile: cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

---
# ── neo4j: graph backend for the connections module ──────────────────────────
spring:
  config:
    activate:
      on-profile: neo4j
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:password}

---
# ── feeddb: dedicated Postgres (DB B) for the feed + notification modules ─────
# Moves FeedEntry + Notification to a SECOND Postgres, wired by platform.persistence
# (a second DataSource / EMF / transactionManager). Everything else — users, posts,
# connections, jobs, the Modulith event registry — stays on the primary datasource.
# Combine with 'postgres' for the primary DB.
#
# Read replicas: each DB's DataSource routes read-only transactions to its '.read'
# endpoint (a reader endpoint / HAProxy over N replicas) and writes/DDL to the primary.
# Each '.read.url' defaults to its own primary, so with NO replica set nothing changes —
# reads and writes both hit the primary. Point *_DATASOURCE_READ_URL at the replicas to
# switch reads over, no code change. Mind replication lag: a read right after a write may
# be stale (put strict read-your-writes paths in a non-readOnly tx so they hit the primary).
spring:
  config:
    activate:
      on-profile: feeddb
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  datasource:
    read:
      url: ${SPRING_DATASOURCE_READ_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkedin}}
      username: ${SPRING_DATASOURCE_READ_USERNAME:${SPRING_DATASOURCE_USERNAME:linkedin}}
      password: ${SPRING_DATASOURCE_READ_PASSWORD:${SPRING_DATASOURCE_PASSWORD:linkedin}}
feed:
  datasource:
    url: ${FEED_DATASOURCE_URL:jdbc:postgresql://localhost:5433/linkedin_feed}
    username: ${FEED_DATASOURCE_USERNAME:linkedin}
    password: ${FEED_DATASOURCE_PASSWORD:linkedin}
    read:
      url: ${FEED_DATASOURCE_READ_URL:${FEED_DATASOURCE_URL:jdbc:postgresql://localhost:5433/linkedin_feed}}
      username: ${FEED_DATASOURCE_READ_USERNAME:${FEED_DATASOURCE_USERNAME:linkedin}}
      password: ${FEED_DATASOURCE_READ_PASSWORD:${FEED_DATASOURCE_PASSWORD:linkedin}}
